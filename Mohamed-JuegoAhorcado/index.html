<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
  <title>Juego Ahorcado</title>
</head>

<body>
  <div id="contenedor-popup" class="popup">
    <div class="cierra-popup">x</div>
    <form id="form" class="form">
      <h2>Registrarse</h2>
      <div class="form-control">
        <label for="nomUsuario">Nombre:</label>
        <input type="text" id="nomUsuario" placeholder="Escriba su nombre" />
        <small>Mensaje de error</small>
      </div>
      <div class="form-control">
        <label for="email">Email:</label>
        <input type="email" id="email" placeholder="Escriba su correo" />
        <small>Mensaje de error</small>
      </div>
      <div class="form-control">
        <label for="password">Contraseña:</label>
        <input type="password" id="password" placeholder="Escriba su contraseña" />
        <small>Mensaje de error</small>
      </div>
      <div class="form-control">
        <label for="password2">Confirmar contraseña:</label>
        <input type="password" id="password2" placeholder="Repita la contraseña" />
        <small>Mensaje de error</small>
      </div>
      <button type="submit">Entrar al juego</button>
    </form>
  </div>

  <h1>El juego del Ahorcado</h1>

  <label for="tema">Selecciona un tema:</label>
  <select id="tema">
    <option value="">-- Elige un tema --</option>
  </select>

  <p class="texto">Selecciona una letra, te quedan <span id="contador-intentos">0</span> intentos.</p>
  <div class="palabra-oculta"></div>

  <div class="contenedor">
    <!-- Letras del abecedario -->
    <div class="fila">
      <div class="abecedario">A</div>
      <div class="abecedario">B</div>
      <div class="abecedario">C</div>
      <div class="abecedario">D</div>
      <div class="abecedario">E</div>
      <div class="abecedario">F</div>
      <div class="abecedario">G</div>
      <div class="abecedario">H</div>
    </div>
    <div class="fila">
      <div class="abecedario">I</div>
      <div class="abecedario">J</div>
      <div class="abecedario">K</div>
      <div class="abecedario">L</div>
      <div class="abecedario">M</div>
      <div class="abecedario">N</div>
      <div class="abecedario">Ñ</div>
      <div class="abecedario">O</div>
    </div>
    <div class="fila">
      <div class="abecedario">P</div>
      <div class="abecedario">Q</div>
      <div class="abecedario">R</div>
      <div class="abecedario">S</div>
      <div class="abecedario">T</div>
      <div class="abecedario">U</div>
      <div class="abecedario">V</div>
      <div class="abecedario">W</div>
    </div>
    <div class="fila">
      <div class="abecedario">X</div>
      <div class="abecedario">Y</div>
      <div class="abecedario">Z</div>
    </div>
  </div>

  <p class="texto">Has manjat <span id="contador-errores">0</span> intentos</p>
  <p class="texto">Tiempo total: <span id="cronometro">00:00</span></p>
  <p class="texto">Cuenta atrás: <span id="cuenta-atras">--</span></p>

  <script src="script.js"></script>
  <script src="form-register.js"></script>
</body>

</html>
