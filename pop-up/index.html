<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="/formularios/style.css">
    <title>Pop-Up</title>
  </head>
  <body>
    <button>Haz clic!</button>
    <div class="contenidor-popup">
      <div class="popup">
        <div class="cierra-popup">x</div>
        <div class="contenido-popup">
          <form action id="form" class="form">
            <h2>Registrarse</h2>
            <div class="form-control">
              <label for="nomUsuario">Nombre:</label>
              <input type="text" id="nomUsuario"
                placeholder="escriba su nombre">
              <small>Mensaje de error</small>
            </div>
            <div class="form-control">
              <label for="email">Email:</label>
              <input type="email" id="email" placeholder="escriba su correo">
              <small>Mensaje de error</small>
            </div>
            <div class="form-control">
              <label for="password">Contraseña:</label>
              <input type="password" id="password"
                placeholder="escriba su contraseña">
              <small>Mensaje de error</small>
            </div>
            <div class="form-control">
              <label for="password2">Confirmar contraseña:</label>
              <input type="password" id="password2"
                placeholder="escriba su contraseña de nuevo">
              <small>Mensaje de error</small>
            </div>
            <button type="submit">Submit</button>
          </form>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
    <script src="/formularios/script.js"></script>
  </body>
</html>
